<svg width="760" height="500" viewBox="0 0 760 500" xmlns="http://www.w3.org/2000/svg"
     font-family="-apple-system,BlinkMacSystemFont,'Segoe UI Variable','Segoe UI',system-ui,Inter,Roboto,Helvetica,Arial,sans-serif"
     role="img" aria-labelledby="archTitle archDesc">
  <title id="archTitle">Kitsune MCP architecture</title>
  <desc id="archDesc">Diagram: AI client connects via MCP stdio to Kitsune MCP, which exposes six built-in tools and a ~500-token resting footprint. Kitsune fans out to seven public registries via search() and mounts target servers on demand via shapeshift() and call().</desc>

  <defs>
    <marker id="arrBlue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0 0 L10 4 L0 8 L2.5 4 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrGreen" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0 0 L10 4 L0 8 L2.5 4 Z" fill="#16a34a"/>
    </marker>
    <marker id="arrAmber" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0 0 L10 4 L0 8 L2.5 4 Z" fill="#d97706"/>
    </marker>

    <filter id="cardShadow" x="-5%" y="-10%" width="110%" height="125%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.06"/>
    </filter>

    <style>
      .bg            { fill: #ffffff }
      .client-box    { fill: #eff6ff; stroke: #93c5fd; stroke-width: 1.5 }
      .client-title  { fill: #1e3a8a }
      .client-sub    { fill: #2563eb }
      .kitsune-box   { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2 }
      .kitsune-title { fill: #14532d }
      .kitsune-sub   { fill: #15803d }
      .pill          { fill: #ffffff; stroke: #86efac; stroke-width: 1.25 }
      .pill-text     { fill: #14532d }
      .badge-box     { fill: #dcfce7; stroke: #4ade80; stroke-width: 1.25 }
      .badge-text    { fill: #14532d }
      .reg-box       { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.5 }
      .reg-title     { fill: #0f172a }
      .reg-body      { fill: #334155 }
      .reg-note      { fill: #64748b }
      .srv-box       { fill: #fffbeb; stroke: #fbbf24; stroke-width: 1.5 }
      .srv-title     { fill: #92400e }
      .srv-body      { fill: #b45309 }
      .srv-note      { fill: #a16207 }
      .arrow-label-b { fill: #1d4ed8 }
      .arrow-label-g { fill: #15803d }
      .arrow-label-a { fill: #b45309 }
      .divider       { stroke: #bbf7d0; stroke-width: 1 }
      .note          { fill: #475569 }
    </style>
  </defs>

  <rect width="760" height="500" class="bg"/>

  <!-- ─────────────── AI Client ─────────────── -->
  <rect x="200" y="24" width="360" height="56" rx="10" class="client-box" filter="url(#cardShadow)"/>
  <text x="380" y="48" text-anchor="middle" class="client-title" font-size="14" font-weight="700" letter-spacing="-0.005em">Your AI Client</text>
  <text x="380" y="67" text-anchor="middle" class="client-sub" font-size="11.5">Claude · Cursor · Cline · any MCP-compatible host</text>

  <!-- Client → Kitsune arrow -->
  <line x1="380" y1="82" x2="380" y2="126" stroke="#2563eb" stroke-width="2" marker-end="url(#arrBlue)"/>
  <text x="392" y="108" class="arrow-label-b" font-size="11.5" font-weight="600">MCP stdio</text>

  <!-- ─────────────── Kitsune MCP ─────────────── -->
  <rect x="20" y="130" width="720" height="180" rx="14" class="kitsune-box" filter="url(#cardShadow)"/>

  <text x="380" y="160" text-anchor="middle" class="kitsune-title" font-size="18" font-weight="800" letter-spacing="-0.01em">🦊  Kitsune MCP</text>
  <text x="380" y="178" text-anchor="middle" class="kitsune-sub" font-size="11" font-weight="600" letter-spacing="0.08em">V0.20.1  ·  SIX BUILT-IN TOOLS</text>

  <line x1="60" y1="190" x2="700" y2="190" class="divider"/>

  <!-- Row 1 pills: status, search, shapeshift, call -->
  <!-- Widths: 76,76,96,60 = 308 + 3*12 = 344 → start at 208 -->
  <g>
    <rect x="208" y="202" width="76" height="26" rx="13" class="pill"/>
    <text x="246" y="220" text-anchor="middle" class="pill-text" font-size="12" font-weight="600">status()</text>

    <rect x="296" y="202" width="76" height="26" rx="13" class="pill"/>
    <text x="334" y="220" text-anchor="middle" class="pill-text" font-size="12" font-weight="600">search()</text>

    <rect x="384" y="202" width="96" height="26" rx="13" class="pill"/>
    <text x="432" y="220" text-anchor="middle" class="pill-text" font-size="12" font-weight="600">shapeshift()</text>

    <rect x="492" y="202" width="60" height="26" rx="13" class="pill"/>
    <text x="522" y="220" text-anchor="middle" class="pill-text" font-size="12" font-weight="600">call()</text>
  </g>

  <!-- Row 2: auth, auto + ~500 tokens badge -->
  <!-- Widths: 64,64,168 = 296 + 2*12 = 320 → start at 220 -->
  <g>
    <rect x="220" y="236" width="64" height="26" rx="13" class="pill"/>
    <text x="252" y="254" text-anchor="middle" class="pill-text" font-size="12" font-weight="600">auth()</text>

    <rect x="296" y="236" width="64" height="26" rx="13" class="pill"/>
    <text x="328" y="254" text-anchor="middle" class="pill-text" font-size="12" font-weight="600">auto()</text>

    <rect x="372" y="236" width="168" height="26" rx="9" class="badge-box"/>
    <text x="456" y="254" text-anchor="middle" class="badge-text" font-size="12" font-weight="700">~500 tokens at rest</text>
  </g>

  <!-- Subtitle row -->
  <text x="380" y="284" text-anchor="middle" class="note" font-size="11.5">
    After shapeshift() the mounted server tools appear natively · empty shapeshift() releases them
  </text>
  <text x="380" y="300" text-anchor="middle" class="note" font-size="11" font-style="italic" opacity="0.85">
    read_file  ·  git_log  ·  brave_web_search  ·  get_current_time  ·  notion-search  ·  …
  </text>

  <!-- ─────────────── Arrows out of Kitsune ─────────────── -->
  <line x1="216" y1="310" x2="176" y2="356" stroke="#16a34a" stroke-width="2" marker-end="url(#arrGreen)"/>
  <text x="116" y="332" text-anchor="middle" class="arrow-label-g" font-size="12.5" font-weight="700">search()</text>

  <line x1="544" y1="310" x2="584" y2="356" stroke="#d97706" stroke-width="2" marker-end="url(#arrAmber)"/>
  <text x="644" y="328" text-anchor="start" class="arrow-label-a" font-size="12.5" font-weight="700">shapeshift()</text>
  <text x="652" y="346" text-anchor="start" class="arrow-label-a" font-size="12.5" font-weight="700">call()</text>

  <!-- ─────────────── 7 Registries ─────────────── -->
  <rect x="20" y="360" width="340" height="122" rx="12" class="reg-box" filter="url(#cardShadow)"/>
  <text x="190" y="386" text-anchor="middle" class="reg-title" font-size="14" font-weight="700">7 Registries</text>
  <text x="190" y="406" text-anchor="middle" class="reg-body" font-size="12">official · mcpregistry · glama</text>
  <text x="190" y="422" text-anchor="middle" class="reg-body" font-size="12">npm · pypi · github · smithery</text>
  <text x="190" y="444" text-anchor="middle" class="reg-note" font-size="11">search() fans out across all in parallel</text>
  <text x="190" y="460" text-anchor="middle" class="reg-note" font-size="11">candidates ranked by token cost</text>
  <text x="190" y="476" text-anchor="middle" class="reg-note" font-size="11">no single registry required</text>

  <!-- ─────────────── Target Servers ─────────────── -->
  <rect x="400" y="360" width="340" height="122" rx="12" class="srv-box" filter="url(#cardShadow)"/>
  <text x="570" y="386" text-anchor="middle" class="srv-title" font-size="14" font-weight="700">Target Servers  ·  on demand</text>
  <text x="570" y="406" text-anchor="middle" class="srv-body" font-size="12">stdio  via  npx / uvx  —  local subprocess</text>
  <text x="570" y="422" text-anchor="middle" class="srv-body" font-size="12">HTTP + SSE  —  Smithery · self-hosted</text>
  <text x="570" y="438" text-anchor="middle" class="srv-body" font-size="12">WebSocket  ·  Docker</text>
  <text x="570" y="460" text-anchor="middle" class="srv-note" font-size="11">persistent process pool</text>
  <text x="570" y="476" text-anchor="middle" class="srv-note" font-size="11">re-attach within session: 0 ms</text>
</svg>
