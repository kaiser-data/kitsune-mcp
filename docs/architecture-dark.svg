<svg width="760" height="500" viewBox="0 0 760 500" xmlns="http://www.w3.org/2000/svg"
     font-family="-apple-system,BlinkMacSystemFont,'Segoe UI Variable','Segoe UI',system-ui,Inter,Roboto,Helvetica,Arial,sans-serif"
     role="img" aria-labelledby="archTitle archDesc">
  <title id="archTitle">Kitsune MCP architecture</title>
  <desc id="archDesc">AI client connects via MCP stdio to Kitsune MCP, which exposes six built-in tools and a ~1,321-token resting footprint. Kitsune fans out to seven public registries via search() and mounts target servers on demand via shapeshift() and call().</desc>

  <defs>
    <marker id="arrBlue" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 Z" fill="#60a5fa"/>
    </marker>
    <marker id="arrGreen" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 Z" fill="#34d399"/>
    </marker>
    <marker id="arrAmber" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 Z" fill="#fbbf24"/>
    </marker>

    <style>
      .bg          { fill: #0b1220 }

      /* All three cards share the same neutral surface */
      .card        { fill: #131c2e; stroke: #1f2a44; stroke-width: 1 }

      /* Kitsune is the hero — keeps the neutral surface but gets a green outline */
      .kitsune     { fill: #131c2e; stroke: #34d399; stroke-width: 1.5 }

      .accent-line { stroke: #1f2a44; stroke-width: 1 }

      /* Typography */
      .h1          { fill: #f8fafc; letter-spacing: -0.01em }
      .h2          { fill: #e2e8f0 }
      .label-green { fill: #6ee7b7; letter-spacing: 0.10em }
      .label-blue  { fill: #93c5fd; letter-spacing: 0.10em }
      .label-amber { fill: #fcd34d; letter-spacing: 0.10em }
      .body        { fill: #cbd5e1 }
      .muted       { fill: #94a3b8 }
      .dim         { fill: #64748b }

      /* Pills: subtle elevated chip */
      .pill        { fill: #1e2a44; stroke: #334155; stroke-width: 1 }
      .pill-text   { fill: #e2e8f0 }
      .pill-hero   { fill: #1e2a44; stroke: #34d399; stroke-width: 1 }
      .pill-hero-t { fill: #6ee7b7 }

      /* Inline arrow labels */
      .lbl-blue    { fill: #93c5fd }
      .lbl-green   { fill: #6ee7b7 }
      .lbl-amber   { fill: #fcd34d }
    </style>
  </defs>

  <rect width="760" height="500" class="bg"/>

  <!-- ─────────── AI Client (top) ─────────── -->
  <rect x="200" y="22" width="360" height="60" rx="10" class="card"/>
  <text x="380" y="44" text-anchor="middle" class="label-blue" font-size="10.5" font-weight="700">AI CLIENT</text>
  <text x="380" y="64" text-anchor="middle" class="body" font-size="12">Claude · Cursor · Cline · any MCP-compatible host</text>

  <!-- Client → Kitsune arrow -->
  <line x1="380" y1="84" x2="380" y2="126" stroke="#60a5fa" stroke-width="1.75" marker-end="url(#arrBlue)"/>
  <text x="392" y="109" class="lbl-blue" font-size="11" font-weight="600">MCP stdio</text>

  <!-- ─────────── Kitsune MCP (hero) ─────────── -->
  <rect x="20" y="132" width="720" height="178" rx="14" class="kitsune"/>

  <!-- Hero title -->
  <text x="380" y="161" text-anchor="middle" class="h1" font-size="20" font-weight="800">🦊  Kitsune MCP</text>
  <text x="380" y="180" text-anchor="middle" class="label-green" font-size="10.5" font-weight="700">V0.20.6  ·  SIX BUILT-IN TOOLS</text>

  <line x1="60" y1="194" x2="700" y2="194" class="accent-line"/>

  <!-- Row 1: status, search, shapeshift, call -->
  <!-- pill widths 76,76,96,60 + 3*12 gaps = 344; start at 208 -->
  <g>
    <rect x="208" y="208" width="76" height="26" rx="13" class="pill"/>
    <text x="246" y="226" text-anchor="middle" class="pill-text" font-size="12" font-weight="600">status()</text>

    <rect x="296" y="208" width="76" height="26" rx="13" class="pill"/>
    <text x="334" y="226" text-anchor="middle" class="pill-text" font-size="12" font-weight="600">search()</text>

    <rect x="384" y="208" width="96" height="26" rx="13" class="pill"/>
    <text x="432" y="226" text-anchor="middle" class="pill-text" font-size="12" font-weight="600">shapeshift()</text>

    <rect x="492" y="208" width="60" height="26" rx="13" class="pill"/>
    <text x="522" y="226" text-anchor="middle" class="pill-text" font-size="12" font-weight="600">call()</text>
  </g>

  <!-- Row 2: auth, auto + 500 tokens badge (hero-tinted pill) -->
  <g>
    <rect x="220" y="242" width="64" height="26" rx="13" class="pill"/>
    <text x="252" y="260" text-anchor="middle" class="pill-text" font-size="12" font-weight="600">auth()</text>

    <rect x="296" y="242" width="64" height="26" rx="13" class="pill"/>
    <text x="328" y="260" text-anchor="middle" class="pill-text" font-size="12" font-weight="600">auto()</text>

    <rect x="372" y="242" width="168" height="26" rx="9" class="pill-hero"/>
    <text x="456" y="260" text-anchor="middle" class="pill-hero-t" font-size="12" font-weight="700">~1,321 tokens at rest</text>
  </g>

  <!-- Caption -->
  <text x="380" y="290" text-anchor="middle" class="muted" font-size="11.5">
    shapeshift() mounts target tools natively · empty shapeshift() releases them
  </text>
  <text x="380" y="305" text-anchor="middle" class="dim" font-size="11" font-style="italic">
    read_file  ·  git_log  ·  brave_web_search  ·  get_current_time  ·  notion-search  ·  …
  </text>

  <!-- ─────────── Arrows out of Kitsune ─────────── -->
  <line x1="216" y1="310" x2="178" y2="354" stroke="#34d399" stroke-width="1.75" marker-end="url(#arrGreen)"/>
  <text x="116" y="332" text-anchor="middle" class="lbl-green" font-size="12" font-weight="700">search()</text>

  <line x1="544" y1="310" x2="582" y2="354" stroke="#fbbf24" stroke-width="1.75" marker-end="url(#arrAmber)"/>
  <text x="644" y="328" text-anchor="start" class="lbl-amber" font-size="12" font-weight="700">shapeshift()</text>
  <text x="652" y="346" text-anchor="start" class="lbl-amber" font-size="12" font-weight="700">call()</text>

  <!-- ─────────── 7 Registries ─────────── -->
  <rect x="20" y="358" width="340" height="124" rx="12" class="card"/>
  <text x="190" y="380" text-anchor="middle" class="label-green" font-size="10.5" font-weight="700">DISCOVERY</text>
  <text x="190" y="402" text-anchor="middle" class="h2" font-size="14" font-weight="700">7 Registries</text>
  <text x="190" y="421" text-anchor="middle" class="body" font-size="12">official · mcpregistry · glama</text>
  <text x="190" y="437" text-anchor="middle" class="body" font-size="12">npm · pypi · github · smithery</text>
  <text x="190" y="458" text-anchor="middle" class="muted" font-size="11">search() fans out in parallel</text>
  <text x="190" y="473" text-anchor="middle" class="muted" font-size="11">candidates ranked by token cost</text>

  <!-- ─────────── Target Servers ─────────── -->
  <rect x="400" y="358" width="340" height="124" rx="12" class="card"/>
  <text x="570" y="380" text-anchor="middle" class="label-amber" font-size="10.5" font-weight="700">EXECUTION  ·  ON DEMAND</text>
  <text x="570" y="402" text-anchor="middle" class="h2" font-size="14" font-weight="700">Target Servers</text>
  <text x="570" y="421" text-anchor="middle" class="body" font-size="12">stdio via npx / uvx · local subprocess</text>
  <text x="570" y="437" text-anchor="middle" class="body" font-size="12">HTTP + SSE · WebSocket · Docker</text>
  <text x="570" y="458" text-anchor="middle" class="muted" font-size="11">persistent process pool</text>
  <text x="570" y="473" text-anchor="middle" class="muted" font-size="11">re-attach within session: 0 ms</text>
</svg>
