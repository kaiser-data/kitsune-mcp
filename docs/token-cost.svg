<svg width="760" height="545" xmlns="http://www.w3.org/2000/svg"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>

    <linearGradient id="gRed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f87171"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>

    <linearGradient id="gAmber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>

    <filter id="drop" x="-10%" y="-5%" width="120%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="5"
                    flood-color="#000000" flood-opacity="0.20"/>
    </filter>

    <style>
      .bg       { fill: #ffffff }
      .chartbg  { fill: #f9fafb }
      .grid     { stroke: #e5e7eb }
      .base     { stroke: #d1d5db }
      .axlabel  { fill: #6b7280 }
      .axtitle  { fill: #374151 }
      .title    { fill: #111827 }
      .sub      { fill: #6b7280 }
      .glabel   { fill: #374151 }
      .gsub     { fill: #6b7280 }
      .kval     { fill: #92400e }
      .aoval    { fill: #374151 }
      .lgtext   { fill: #374151 }

      @media (prefers-color-scheme: dark) {
        .bg       { fill: #1e293b }
        .chartbg  { fill: #0f172a }
        .grid     { stroke: #1e3a5f }
        .base     { stroke: #334155 }
        .axlabel  { fill: #64748b }
        .axtitle  { fill: #cbd5e1 }
        .title    { fill: #f1f5f9 }
        .sub      { fill: #94a3b8 }
        .glabel   { fill: #e2e8f0 }
        .gsub     { fill: #94a3b8 }
        .kval     { fill: #fbbf24 }
        .aoval    { fill: #cbd5e1 }
        .lgtext   { fill: #d1d5db }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="760" height="545" class="bg" rx="12"/>

  <!-- Title -->
  <text x="380" y="33" text-anchor="middle" class="title"
        font-size="15" font-weight="700">
    Token cost per turn — always-on vs Kitsune
  </text>
  <text x="380" y="52" text-anchor="middle" class="sub" font-size="11">
    Linear scale · v0.20.1 measured · Kitsune = 500 base + surgical mount per call · savings = 1 − Kitsune ÷ always-on
  </text>

  <!-- Chart background -->
  <rect x="78" y="66" width="626" height="388" class="chartbg" rx="6"/>

  <!-- Grid lines at 5K intervals -->
  <g class="grid" stroke-width="1">
    <line x1="78" y1="376" x2="704" y2="376"/>
    <line x1="78" y1="299" x2="704" y2="299"/>
    <line x1="78" y1="221" x2="704" y2="221"/>
    <line x1="78" y1="144" x2="704" y2="144"/>
    <line x1="78" y1="66"  x2="704" y2="66"/>
  </g>

  <!-- Y axis labels (Tokens per turn) -->
  <g class="axlabel" font-size="13" text-anchor="end" font-weight="500">
    <text x="68" y="381">5K</text>
    <text x="68" y="304">10K</text>
    <text x="68" y="226">15K</text>
    <text x="68" y="149">20K</text>
    <text x="68" y="71">25K</text>
  </g>

  <!-- Y axis title -->
  <text transform="rotate(-90,16,260)" x="16" y="260"
        text-anchor="middle" class="axtitle"
        font-size="13" font-weight="600">Tokens per turn</text>

  <!-- Baseline -->
  <line x1="78" y1="454" x2="704" y2="454" class="base" stroke-width="1.5"/>


  <!-- ══════════════════════════════════════════════
       GROUP 1 — 1 server (GitHub)
       always-on: 4,229 → y=388 h=66
       kitsune:     800 → y=442 h=12
       ══════════════════════════════════════════════ -->

  <text x="118" y="382" text-anchor="middle" class="aoval"
        font-size="12" font-weight="600">4,229</text>

  <rect x="78" y="388" width="80" height="66"
        fill="url(#gRed)" rx="4" filter="url(#drop)"/>
  <text x="118" y="416" text-anchor="middle"
        font-size="17" font-weight="800" fill="white">81%</text>
  <text x="118" y="432" text-anchor="middle"
        font-size="10" fill="#fecaca">saved</text>

  <text x="213" y="435" text-anchor="middle" class="kval"
        font-size="12" font-weight="600">800</text>
  <rect x="173" y="442" width="80" height="12"
        fill="url(#gAmber)" rx="3" filter="url(#drop)"/>

  <text x="165" y="474" text-anchor="middle" class="glabel"
        font-size="13" font-weight="700">1 server</text>
  <text x="165" y="491" text-anchor="middle" class="gsub"
        font-size="12">26 tools always loaded</text>


  <!-- ══════════════════════════════════════════════
       GROUP 2 — 3 servers
       always-on: 8,678 → y=319 h=135
       kitsune:   1,190 → y=436 h=18
       ══════════════════════════════════════════════ -->

  <text x="343" y="313" text-anchor="middle" class="aoval"
        font-size="12" font-weight="600">8,678</text>

  <rect x="303" y="319" width="80" height="135"
        fill="url(#gRed)" rx="4" filter="url(#drop)"/>
  <text x="343" y="376" text-anchor="middle"
        font-size="16" font-weight="800" fill="white">86–91%</text>
  <text x="343" y="396" text-anchor="middle"
        font-size="10" fill="#fecaca">saved</text>

  <text x="438" y="429" text-anchor="middle" class="kval"
        font-size="12" font-weight="600">~1,190</text>
  <rect x="398" y="436" width="80" height="18"
        fill="url(#gAmber)" rx="3" filter="url(#drop)"/>

  <text x="390" y="474" text-anchor="middle" class="glabel"
        font-size="13" font-weight="700">3 servers</text>
  <text x="390" y="491" text-anchor="middle" class="gsub"
        font-size="12">52 tools always loaded</text>


  <!-- ══════════════════════════════════════════════
       GROUP 3 — 5 servers (dominant tower)
       always-on: 25,000 → y=66 h=388
       kitsune:    2,450 → y=416 h=38
       ══════════════════════════════════════════════ -->

  <rect x="528" y="66" width="80" height="388"
        fill="url(#gRed)" rx="4" filter="url(#drop)"/>
  <text x="568" y="90" text-anchor="middle"
        font-size="12" fill="#fca5a5" font-weight="600">25,000</text>

  <!-- Large dramatic savings text centred in tall bar -->
  <text x="568" y="248" text-anchor="middle"
        font-size="32" font-weight="900" fill="white">90–97%</text>
  <text x="568" y="284" text-anchor="middle"
        font-size="13" font-weight="600" fill="#fecaca">saved</text>

  <text x="663" y="409" text-anchor="middle" class="kval"
        font-size="12" font-weight="600">~2,450</text>
  <rect x="623" y="416" width="80" height="38"
        fill="url(#gAmber)" rx="3" filter="url(#drop)"/>

  <text x="615" y="474" text-anchor="middle" class="glabel"
        font-size="13" font-weight="700">5 servers</text>
  <text x="615" y="491" text-anchor="middle" class="gsub"
        font-size="12">75 tools always loaded</text>


  <!-- X axis title -->
  <text x="391" y="511" text-anchor="middle" class="axtitle"
        font-size="13" font-weight="600">Number of always-on MCP servers (all tools in context every turn)</text>


  <!-- ══════════════════════════════════════════════
       Legend
       ══════════════════════════════════════════════ -->

  <rect x="88"  y="524" width="13" height="13" fill="#ef4444" rx="2"/>
  <text x="107" y="535" class="lgtext" font-size="11">
    Always-on (every turn, whether used or not)
  </text>

  <rect x="360" y="524" width="13" height="13" fill="#f59e0b" rx="2"/>
  <text x="379" y="535" class="lgtext" font-size="11">
    Kitsune (500 token base + surgical mount per active call)
  </text>

</svg>
