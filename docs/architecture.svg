<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 456" width="820" height="456"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">

  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#3b82f6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#22c55e"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="456" fill="#f8fafc" rx="14"/>

  <!-- ── AI CLIENT ──────────────────────────────────────── -->
  <rect x="235" y="22" width="350" height="62" rx="10"
        fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="410" y="49" text-anchor="middle" fill="#1d4ed8"
        font-size="15" font-weight="600">Your AI Client</text>
  <text x="410" y="68" text-anchor="middle" fill="#3b82f6" font-size="11">
    Claude Desktop · Cursor · Continue.dev · Zed · any MCP client
  </text>

  <!-- Arrow AI→Chameleon -->
  <line x1="410" y1="84" x2="410" y2="126"
        stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="425" y="108" fill="#93c5fd" font-size="10">stdio · MCP protocol</text>

  <!-- ── CHAMELEON MCP ──────────────────────────────────── -->
  <rect x="30" y="130" width="760" height="138" rx="12"
        fill="#f0fdf4" stroke="#22c55e" stroke-width="2.5"/>

  <text x="410" y="158" text-anchor="middle" fill="#15803d"
        font-size="17" font-weight="700">&#x1F98E;  Chameleon MCP</text>
  <text x="410" y="175" text-anchor="middle" fill="#86efac" font-size="11">
    single entry in mcp.json &#x2022; dynamically becomes any MCP server
  </text>

  <!-- Tool pills -->
  <!-- morph() x=167 w=70 -->
  <rect x="167" y="186" width="70" height="23" rx="11.5" fill="#bbf7d0" stroke="#4ade80" stroke-width="1"/>
  <text x="202" y="202" text-anchor="middle" fill="#15803d" font-size="11">morph()</text>

  <!-- shed() x=245 w=58 -->
  <rect x="245" y="186" width="58" height="23" rx="11.5" fill="#bbf7d0" stroke="#4ade80" stroke-width="1"/>
  <text x="274" y="202" text-anchor="middle" fill="#15803d" font-size="11">shed()</text>

  <!-- search() x=311 w=72 -->
  <rect x="311" y="186" width="72" height="23" rx="11.5" fill="#bbf7d0" stroke="#4ade80" stroke-width="1"/>
  <text x="347" y="202" text-anchor="middle" fill="#15803d" font-size="11">search()</text>

  <!-- call() x=391 w=52 -->
  <rect x="391" y="186" width="52" height="23" rx="11.5" fill="#bbf7d0" stroke="#4ade80" stroke-width="1"/>
  <text x="417" y="202" text-anchor="middle" fill="#15803d" font-size="11">call()</text>

  <!-- run() x=451 w=48 -->
  <rect x="451" y="186" width="48" height="23" rx="11.5" fill="#bbf7d0" stroke="#4ade80" stroke-width="1"/>
  <text x="475" y="202" text-anchor="middle" fill="#15803d" font-size="11">run()</text>

  <!-- connect() x=507 w=76 -->
  <rect x="507" y="186" width="76" height="23" rx="11.5" fill="#bbf7d0" stroke="#4ade80" stroke-width="1"/>
  <text x="545" y="202" text-anchor="middle" fill="#15803d" font-size="11">connect()</text>

  <!-- inspect() x=591 w=68 -->
  <rect x="591" y="186" width="68" height="23" rx="11.5" fill="#bbf7d0" stroke="#4ade80" stroke-width="1"/>
  <text x="625" y="202" text-anchor="middle" fill="#15803d" font-size="11">inspect()</text>

  <!-- Dashed "morphed tools" row -->
  <rect x="60" y="218" width="700" height="34" rx="7"
        fill="white" stroke="#bbf7d0" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="410" y="239" text-anchor="middle" fill="#94a3b8" font-size="10.5">
    after morph() &#x2192;&#xA0;&#xA0;read_file&#xA0;&#xA0;&#x2022;&#xA0;&#xA0;git_log&#xA0;&#xA0;&#x2022;&#xA0;&#xA0;brave_web_search&#xA0;&#xA0;&#x2022;&#xA0;&#xA0;get_current_time&#xA0;&#xA0;&#x2022;&#xA0;&#xA0;&#x2026;
  </text>

  <!-- ── ARROWS DOWN ── Chameleon bottom = y 268 ─────────── -->
  <!-- Source box tops = y 316 -->
  <!-- Box centers: GitHub=119, npm=313, PyPI=507, Smithery=701 -->

  <!-- → GitHub -->
  <line x1="155" y1="268" x2="119" y2="316"
        stroke="#22c55e" stroke-width="1.8" marker-end="url(#arrowGreen)"/>

  <!-- → npm -->
  <line x1="315" y1="268" x2="313" y2="316"
        stroke="#22c55e" stroke-width="1.8" marker-end="url(#arrowGreen)"/>

  <!-- → PyPI -->
  <line x1="505" y1="268" x2="507" y2="316"
        stroke="#22c55e" stroke-width="1.8" marker-end="url(#arrowGreen)"/>

  <!-- → Smithery (dashed = optional) -->
  <line x1="665" y1="268" x2="701" y2="316"
        stroke="#94a3b8" stroke-width="1.8" stroke-dasharray="5 3"
        marker-end="url(#arrowGray)"/>

  <!-- ── SOURCE BOXES ─────────────────────────────────────── -->
  <!-- Layout: 4 × 150 + 5 × 44 gaps = 820 -->

  <!-- GitHub: x=44 -->
  <rect x="44" y="316" width="150" height="106" rx="10"
        fill="#f6f8fa" stroke="#334155" stroke-width="1.8"/>
  <text x="119" y="342" text-anchor="middle" fill="#1e293b"
        font-size="14" font-weight="600">GitHub</text>
  <text x="119" y="360" text-anchor="middle" fill="#64748b" font-size="10">github:user/repo</text>
  <text x="119" y="376" text-anchor="middle" fill="#64748b" font-size="10">npx / uvx --from git+&#x2026;</text>
  <rect x="64" y="388" width="110" height="18" rx="9" fill="#dcfce7"/>
  <text x="119" y="401" text-anchor="middle" fill="#16a34a"
        font-size="9" font-weight="600">no auth required</text>

  <!-- npm: x=238 -->
  <rect x="238" y="316" width="150" height="106" rx="10"
        fill="#fff1f2" stroke="#e11d48" stroke-width="1.8"/>
  <text x="313" y="342" text-anchor="middle" fill="#be123c"
        font-size="14" font-weight="600">npm</text>
  <text x="313" y="360" text-anchor="middle" fill="#64748b" font-size="10">registry.npmjs.org</text>
  <text x="313" y="376" text-anchor="middle" fill="#64748b" font-size="10">npx -y &lt;package&gt;</text>
  <rect x="258" y="388" width="110" height="18" rx="9" fill="#dcfce7"/>
  <text x="313" y="401" text-anchor="middle" fill="#16a34a"
        font-size="9" font-weight="600">no auth required</text>

  <!-- PyPI: x=432 -->
  <rect x="432" y="316" width="150" height="106" rx="10"
        fill="#eff6ff" stroke="#3b82f6" stroke-width="1.8"/>
  <text x="507" y="342" text-anchor="middle" fill="#1d4ed8"
        font-size="14" font-weight="600">PyPI</text>
  <text x="507" y="360" text-anchor="middle" fill="#64748b" font-size="10">pypi.org</text>
  <text x="507" y="376" text-anchor="middle" fill="#64748b" font-size="10">uvx &lt;package&gt;</text>
  <rect x="452" y="388" width="110" height="18" rx="9" fill="#dcfce7"/>
  <text x="507" y="401" text-anchor="middle" fill="#16a34a"
        font-size="9" font-weight="600">no auth required</text>

  <!-- Smithery: x=626 (optional, dashed) -->
  <rect x="626" y="316" width="150" height="106" rx="10"
        fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="701" y="342" text-anchor="middle" fill="#64748b"
        font-size="14" font-weight="600">Smithery</text>
  <text x="701" y="360" text-anchor="middle" fill="#94a3b8" font-size="10">3,000+ servers</text>
  <text x="701" y="376" text-anchor="middle" fill="#94a3b8" font-size="10">HTTP + SSE</text>
  <rect x="646" y="388" width="110" height="18" rx="9" fill="#f1f5f9"/>
  <text x="701" y="401" text-anchor="middle" fill="#94a3b8"
        font-size="9" font-weight="600">optional API key</text>

  <!-- "optional" label on Smithery arrow -->
  <text x="710" y="300" fill="#94a3b8" font-size="9" font-style="italic">optional</text>

</svg>
