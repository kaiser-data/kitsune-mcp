<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 460" width="820" height="460"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">

  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#3b82f6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#22c55e"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#94a3b8"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#f97316"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="460" fill="#f8fafc" rx="14"/>

  <!-- ── AI CLIENT ──────────────────────────────────────── -->
  <rect x="235" y="22" width="350" height="62" rx="10"
        fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="410" y="49" text-anchor="middle" fill="#1d4ed8"
        font-size="15" font-weight="600">Your AI Client</text>
  <text x="410" y="68" text-anchor="middle" fill="#3b82f6" font-size="11">
    Claude Desktop · Cursor · Continue.dev · Zed · any MCP client
  </text>

  <!-- Arrow AI→Chameleon -->
  <line x1="410" y1="84" x2="410" y2="126"
        stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="425" y="108" fill="#93c5fd" font-size="10">stdio · MCP protocol</text>

  <!-- ── CHAMELEON MCP ──────────────────────────────────── -->
  <rect x="30" y="130" width="760" height="164" rx="12"
        fill="#f0fdf4" stroke="#22c55e" stroke-width="2.5"/>

  <text x="410" y="158" text-anchor="middle" fill="#15803d"
        font-size="17" font-weight="700">&#x1F98E;  Chameleon MCP</text>
  <text x="410" y="175" text-anchor="middle" fill="#86efac" font-size="11">
    single entry in mcp.json &#x2022; dynamically becomes any MCP server &#x2022; craft your own tools
  </text>

  <!-- Tool pills — row 1 -->
  <rect x="120" y="186" width="70" height="23" rx="11.5" fill="#bbf7d0" stroke="#4ade80" stroke-width="1"/>
  <text x="155" y="202" text-anchor="middle" fill="#15803d" font-size="11">morph()</text>

  <rect x="198" y="186" width="58" height="23" rx="11.5" fill="#bbf7d0" stroke="#4ade80" stroke-width="1"/>
  <text x="227" y="202" text-anchor="middle" fill="#15803d" font-size="11">shed()</text>

  <rect x="264" y="186" width="72" height="23" rx="11.5" fill="#bbf7d0" stroke="#4ade80" stroke-width="1"/>
  <text x="300" y="202" text-anchor="middle" fill="#15803d" font-size="11">search()</text>

  <rect x="344" y="186" width="52" height="23" rx="11.5" fill="#bbf7d0" stroke="#4ade80" stroke-width="1"/>
  <text x="370" y="202" text-anchor="middle" fill="#15803d" font-size="11">call()</text>

  <rect x="404" y="186" width="48" height="23" rx="11.5" fill="#bbf7d0" stroke="#4ade80" stroke-width="1"/>
  <text x="428" y="202" text-anchor="middle" fill="#15803d" font-size="11">run()</text>

  <rect x="460" y="186" width="76" height="23" rx="11.5" fill="#bbf7d0" stroke="#4ade80" stroke-width="1"/>
  <text x="498" y="202" text-anchor="middle" fill="#15803d" font-size="11">connect()</text>

  <rect x="544" y="186" width="68" height="23" rx="11.5" fill="#bbf7d0" stroke="#4ade80" stroke-width="1"/>
  <text x="578" y="202" text-anchor="middle" fill="#15803d" font-size="11">inspect()</text>

  <rect x="620" y="186" width="52" height="23" rx="11.5" fill="#bbf7d0" stroke="#4ade80" stroke-width="1"/>
  <text x="646" y="202" text-anchor="middle" fill="#15803d" font-size="11">test()</text>

  <rect x="680" y="186" width="58" height="23" rx="11.5" fill="#bbf7d0" stroke="#4ade80" stroke-width="1"/>
  <text x="709" y="202" text-anchor="middle" fill="#15803d" font-size="11">bench()</text>

  <!-- Tool pills — row 2 -->
  <rect x="270" y="216" width="52" height="23" rx="11.5" fill="#bbf7d0" stroke="#4ade80" stroke-width="1"/>
  <text x="296" y="232" text-anchor="middle" fill="#15803d" font-size="11">auto()</text>

  <rect x="330" y="216" width="54" height="23" rx="11.5" fill="#bbf7d0" stroke="#4ade80" stroke-width="1"/>
  <text x="357" y="232" text-anchor="middle" fill="#15803d" font-size="11">skill()</text>

  <rect x="392" y="216" width="42" height="23" rx="11.5" fill="#bbf7d0" stroke="#4ade80" stroke-width="1"/>
  <text x="413" y="232" text-anchor="middle" fill="#15803d" font-size="11">key()</text>

  <rect x="442" y="216" width="60" height="23" rx="11.5" fill="#bbf7d0" stroke="#4ade80" stroke-width="1"/>
  <text x="472" y="232" text-anchor="middle" fill="#15803d" font-size="11">status()</text>

  <!-- craft() pill — highlighted in orange to stand out -->
  <rect x="514" y="216" width="58" height="23" rx="11.5" fill="#ffedd5" stroke="#f97316" stroke-width="1.5"/>
  <text x="543" y="232" text-anchor="middle" fill="#c2410c" font-size="11" font-weight="600">craft()</text>

  <!-- Dashed "morphed tools" row -->
  <rect x="60" y="248" width="700" height="34" rx="7"
        fill="white" stroke="#bbf7d0" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="410" y="269" text-anchor="middle" fill="#94a3b8" font-size="10.5">
    after morph()/craft() &#x2192;&#xA0;&#xA0;read_file&#xA0;&#xA0;&#x2022;&#xA0;&#xA0;git_log&#xA0;&#xA0;&#x2022;&#xA0;&#xA0;my_ranker&#xA0;&#xA0;&#x2022;&#xA0;&#xA0;brave_web_search&#xA0;&#xA0;&#x2022;&#xA0;&#xA0;&#x2026;
  </text>

  <!-- ── ARROWS DOWN ── -->
  <!-- → GitHub -->
  <line x1="130" y1="294" x2="100" y2="330"
        stroke="#22c55e" stroke-width="1.8" marker-end="url(#arrowGreen)"/>

  <!-- → npm -->
  <line x1="278" y1="294" x2="278" y2="330"
        stroke="#22c55e" stroke-width="1.8" marker-end="url(#arrowGreen)"/>

  <!-- → PyPI -->
  <line x1="430" y1="294" x2="430" y2="330"
        stroke="#22c55e" stroke-width="1.8" marker-end="url(#arrowGreen)"/>

  <!-- → Smithery (dashed = optional) -->
  <line x1="582" y1="294" x2="582" y2="330"
        stroke="#94a3b8" stroke-width="1.8" stroke-dasharray="5 3"
        marker-end="url(#arrowGray)"/>

  <!-- → Custom endpoint (orange) -->
  <line x1="730" y1="294" x2="730" y2="330"
        stroke="#f97316" stroke-width="1.8" marker-end="url(#arrowOrange)"/>

  <!-- ── SOURCE BOXES ─────────────────────────────────────── -->

  <!-- GitHub: x=30 -->
  <rect x="30" y="330" width="135" height="80" rx="10"
        fill="#f6f8fa" stroke="#334155" stroke-width="1.8"/>
  <text x="97" y="357" text-anchor="middle" fill="#1e293b"
        font-size="13" font-weight="600">GitHub</text>
  <text x="97" y="375" text-anchor="middle" fill="#64748b" font-size="10">github:user/repo</text>
  <text x="97" y="391" text-anchor="middle" fill="#64748b" font-size="10">npx / uvx --from git+…</text>

  <!-- npm: x=178 -->
  <rect x="178" y="330" width="135" height="80" rx="10"
        fill="#fff1f2" stroke="#e11d48" stroke-width="1.8"/>
  <text x="246" y="357" text-anchor="middle" fill="#be123c"
        font-size="13" font-weight="600">npm</text>
  <text x="246" y="375" text-anchor="middle" fill="#64748b" font-size="10">registry.npmjs.org</text>
  <text x="246" y="391" text-anchor="middle" fill="#64748b" font-size="10">npx -y &lt;package&gt;</text>

  <!-- PyPI: x=326 -->
  <rect x="326" y="330" width="135" height="80" rx="10"
        fill="#eff6ff" stroke="#3b82f6" stroke-width="1.8"/>
  <text x="393" y="357" text-anchor="middle" fill="#1d4ed8"
        font-size="13" font-weight="600">PyPI</text>
  <text x="393" y="375" text-anchor="middle" fill="#64748b" font-size="10">pypi.org</text>
  <text x="393" y="391" text-anchor="middle" fill="#64748b" font-size="10">uvx &lt;package&gt;</text>

  <!-- Smithery: x=474 (optional, dashed) -->
  <rect x="474" y="330" width="135" height="80" rx="10"
        fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="541" y="357" text-anchor="middle" fill="#64748b"
        font-size="13" font-weight="600">Smithery</text>
  <text x="541" y="375" text-anchor="middle" fill="#94a3b8" font-size="10">3,000+ servers</text>
  <text x="541" y="391" text-anchor="middle" fill="#94a3b8" font-size="10">HTTP + SSE · optional</text>

  <!-- Custom endpoint: x=622 (orange) -->
  <rect x="622" y="330" width="168" height="80" rx="10"
        fill="#fff7ed" stroke="#f97316" stroke-width="1.8"/>
  <text x="706" y="354" text-anchor="middle" fill="#c2410c"
        font-size="13" font-weight="600">Your endpoint</text>
  <text x="706" y="372" text-anchor="middle" fill="#9a3412" font-size="10">craft("my_tool", …,</text>
  <text x="706" y="387" text-anchor="middle" fill="#9a3412" font-size="10">url="localhost:8080")</text>
  <text x="706" y="402" text-anchor="middle" fill="#ea580c" font-size="9" font-style="italic">POST / GET · live prototyping</text>

</svg>
