name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    # Hard backstop: a hung import/collection used to run the runner for ~50 min
    # until it died with "lost communication". Cap the whole job instead.
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]" pytest-cov

      - name: Lint with ruff
        run: ruff check server.py server_forge.py kitsune_mcp/ tests/

      - name: Run tests with coverage
        # The suite has hung at collection/import time on Linux runners (a real
        # subprocess spawn that never returns). Capturing *where* it hangs needs care:
        #  - output goes to a FILE, not the step's stdout pipe. An orphaned grandchild
        #    that pytest hung on would otherwise hold the pipe open, the step would
        #    never close, and GitHub discards the buffered log on cancellation (which
        #    is exactly what masked the hang before).
        #  - `python -X importtime` logs every import as it happens → the LAST import
        #    before the hang names the culprit module.
        #  - PYTHONFAULTHANDLER + `timeout -s ABRT` dumps all-thread stacks at 4 min.
        # Because output is a file (orphans hold the file, not the pipe), the step
        # closes cleanly once `timeout` returns and the log is readable in the
        # "Show test output" step below.
        run: |
          set +e
          PYTHONFAULTHANDLER=1 PYTHONUNBUFFERED=1 \
            timeout -k 10 -s ABRT 240 \
            python -X importtime -m pytest tests/ -v --tb=short \
            --cov=kitsune_mcp --cov-report=xml \
            > pytest-output.log 2>&1
          code=$?
          echo "pytest exit code: $code"
          exit $code
        env:
          # No real API keys needed — tests use mocks
          SMITHERY_API_KEY: ""

      - name: Show test output (always)
        if: always()
        run: |
          echo "================= pytest output (tail 250) ================="
          tail -250 pytest-output.log 2>/dev/null || echo "(no output file)"
          echo "================= last imports before any hang ============="
          grep -E "import time:" pytest-output.log 2>/dev/null | tail -40 || true

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: false
