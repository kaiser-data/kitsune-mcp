name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    # Hard backstop: a hung import/collection used to run the runner for ~50 min
    # until it died with "lost communication". Cap the whole job instead.
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]" pytest-cov

      - name: Lint with ruff
        run: ruff check server.py server_forge.py kitsune_mcp/ tests/

      - name: Run tests with coverage
        # The suite hangs at collection/import time on Linux runners. Evidence:
        # the step produces zero output, and a previous `timeout -k -s ABRT` wrapper
        # could NOT reap python even with SIGKILL — i.e. python is wedged in
        # uninterruptible (D-state) sleep on a kernel syscall (a spawned subprocess /
        # device / socket during import). Because the process is unkillable, any
        # capture that relies on killing it and reading afterwards loses the log on
        # cancellation. So instead: run pytest in the background writing to a file,
        # and POLL that file from the step itself — echoing diagnostics to the step's
        # stdout (which GitHub streams live and retains) BEFORE giving up. `-X importtime`
        # logs each import as it happens, so the last line names the culprit module.
        run: |
          set +e
          PYTHONFAULTHANDLER=1 PYTHONUNBUFFERED=1 \
            python -X importtime -m pytest tests/ -v --tb=short \
            --cov=kitsune_mcp --cov-report=xml > test.log 2>&1 &
          PID=$!
          DONE=0
          for i in $(seq 1 36); do          # up to 180s (healthy run ~40s)
            sleep 5
            kill -0 $PID 2>/dev/null || { DONE=1; break; }
          done
          if [ $DONE -eq 0 ]; then
            echo "::error::pytest still running after 180s — collection/import HANG."
            echo "===================== last 40 imports (importtime) ====================="
            grep 'import time:' test.log | tail -40
            echo "===================== tail of pytest output ============================"
            tail -100 test.log
            echo "========================================================================"
            kill -9 $PID 2>/dev/null || true   # may not reap a D-state process; diag is already printed
            exit 124
          fi
          wait $PID
          code=$?
          cat test.log
          exit $code
        env:
          # No real API keys needed — tests use mocks
          SMITHERY_API_KEY: ""

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: false
