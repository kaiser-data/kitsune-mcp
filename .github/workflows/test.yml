name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    # Hard backstop: a hung import/collection used to run the runner for ~50 min
    # until it died with "lost communication". Cap the whole job instead.
    # (import 3 + tests 10 + forensics/upload leaves headroom at 20.)
    timeout-minutes: 20
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]" pytest-cov

      - name: Lint with ruff
        run: ruff check server.py server_forge.py kitsune_mcp/ tests/

      # The suite hangs on Linux runners in a way that is unkillable (suspected
      # uninterruptible D-state): SIGKILL, pytest-timeout, job cancellation and even
      # STEP-level timeouts could not surface evidence — when the runner's teardown
      # tries to reap the wedged child it wedges TOO, the job dies, and logs of
      # unfinished steps are not retained (run 28068852528: cancelled, zero steps).
      #
      # This version never lets the runner own the wedged process:
      #   1. pytest runs DETACHED in its own session (setsid) — step teardown never
      #      touches it, so every step here finishes cleanly and keeps its logs.
      #   2. The step shell only polls for an exit-code file.
      #   3. On hang, forensics are captured live (/proc wchan + kernel stacks +
      #      py-spy --nonblocking) and uploaded as an artifact BEFORE anything
      #      times out. Red status is applied by the final gate step, after the
      #      evidence is safe.
      - name: Import check (isolates a collection-time hang from a test-body hang)
        timeout-minutes: 3
        run: |
          setsid bash -c 'PYTHONUNBUFFERED=1 python -X importtime -c "import server, server_forge" > import.log 2>&1 & P=$!; echo $P > import.pid; wait $P; echo $? > import.exit' < /dev/null &
          for i in $(seq 1 90); do [ -f import.exit ] && break; sleep 1; done
          if [ -f import.exit ]; then
            echo "import exited $(cat import.exit) — module import is clean"
            tail -5 import.log
          else
            echo "IMPORT-HANG" >> hang.flag
            bash .github/scripts/hang-forensics.sh import.log import.pid
          fi
        env:
          SMITHERY_API_KEY: ""

      - name: Run tests with coverage (detached + watchdog)
        # This step NEVER opens /proc and never owns the pytest process: the
        # detached wrapper runs the watchdog AND the forensics; probes on the
        # wedged pid each run in their own throwaway session (any of them can
        # block forever — v1/v2 learned that the hard way). The step only
        # polls plain files, so it always finishes and keeps its log.
        timeout-minutes: 12
        run: |
          if [ -f hang.flag ]; then
            echo "skipping — bare import already hangs (see previous step)"; exit 0
          fi
          setsid bash .github/scripts/run-tests-watchdog.sh < /dev/null &
          # wrapper: 300s watchdog + ~60s forensics grace; poll up to 480s
          for i in $(seq 1 480); do
            if [ -f pytest.exit ] || [ -f forensics.done ]; then break; fi
            sleep 1
          done
          if [ -f pytest.exit ]; then
            code=$(cat pytest.exit)
            echo "pytest exited $code"
            tail -60 test.log
            exit "$code"
          fi
          echo "TEST-HANG" >> hang.flag
          if [ -f forensics.done ]; then
            cat hang-forensics.txt
          else
            echo "wrapper never finished forensics; dumping whatever probes returned:"
            tail -150 test.log 2>/dev/null || true
            for f in forensic-probes/*.txt; do echo "--- $f"; cat "$f" 2>/dev/null; done || true
          fi
        env:
          # No real API keys needed — tests use mocks
          SMITHERY_API_KEY: ""

      - name: Upload hang forensics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hang-forensics-py${{ matrix.python-version }}
          path: |
            hang-forensics.txt
            forensic-probes/
            test.log
            import.log
            hang.flag
          if-no-files-found: ignore

      - name: Fail if hang was detected (after evidence is safe)
        if: always()
        run: |
          if [ -f hang.flag ]; then
            echo "::error::suite hang detected: $(cat hang.flag) — see hang-forensics artifact"
            exit 1
          fi

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: false
