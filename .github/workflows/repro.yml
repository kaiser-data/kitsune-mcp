name: repro-control

on:
  push:
    branches: [ci/harden-test-hang-diagnostics]
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    strategy:
      fail-fast: false
      matrix:
        case:
          - yes-pipe-kill        # spawn yes -> unread PIPE -> killpg SIGKILL -> wait
          - yes-pipe-drain-kill  # same but drain the pipe first
          - yes-devnull-kill     # yes -> /dev/null -> killpg -> wait
          - sleep-killpg         # sleep child -> killpg (killpg alone, no flood)
          - rapid-kill           # 20x sleep spawn -> proc.kill() -> wait
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # Detach + poll a marker so a wedge cannot hold the step open on a pipe.
      - name: Run control case ${{ matrix.case }}
        timeout-minutes: 4
        run: |
          setsid bash -c 'python .github/scripts/raw-spawn-repro.py "${{ matrix.case }}" > case.log 2>&1; echo $? > case.exit' \
            < /dev/null > case-wrapper.log 2>&1 &
          for i in $(seq 1 120); do [ -f case.exit ] && break; sleep 1; done
          echo "----- case.log -----"; cat case.log 2>/dev/null || echo "(none)"
          if [ -f case.exit ]; then
            echo "EXIT=$(cat case.exit) — case completed, box survived"
          else
            echo "::error::WEDGE — ${{ matrix.case }} did not finish in 120s (box may be dying)"
            exit 1
          fi
