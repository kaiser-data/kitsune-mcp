name: Publish Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      publish_npm:
        description: 'Also publish to npm (needs one-time Trusted Publisher on npmjs.com)'
        required: false
        type: boolean
        default: false
      publish_registry:
        description: 'Also publish to MCP Registry (needs both PyPI + npm live)'
        required: false
        type: boolean
        default: false

jobs:
  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # OIDC trusted publishing
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    # Only runs when explicitly requested via workflow_dispatch — npm OIDC needs
    # a one-time Trusted Publisher registration at
    # https://www.npmjs.com/package/kitsune-mcp/access (org: kaiser-data,
    # repo: kitsune-mcp, workflow: publish.yml). Skipped on tag push so the
    # workflow stays green for release automation.
    if: github.event_name == 'workflow_dispatch' && inputs.publish_npm
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node 24 (ships with npm 11+ — required for OIDC Trusted Publishing)
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Verify npm version (need >= 11.5.1 for OIDC)
        run: npm --version

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public

  mcp-registry:
    name: Publish to MCP Registry
    runs-on: ubuntu-latest
    needs: [pypi]
    # Skipped on tag push — only runs when explicitly requested via
    # workflow_dispatch, because the registry rejects publishes if either
    # the npm or PyPI package entry in server.json isn't live yet.
    if: github.event_name == 'workflow_dispatch' && inputs.publish_registry
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Install mcp-publisher
        run: |
          curl -fsSL -o mcp-publisher.tar.gz \
            https://github.com/modelcontextprotocol/registry/releases/download/v1.7.6/mcp-publisher_linux_amd64.tar.gz
          tar -xzf mcp-publisher.tar.gz mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/mcp-publisher
          mcp-publisher --version

      - name: Login to MCP Registry (GitHub OIDC)
        run: mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: mcp-publisher publish
