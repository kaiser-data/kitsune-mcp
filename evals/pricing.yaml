# ── Agentic harnesses (subscription-based) ──────────────────────────────────
# These charge per seat/month, not per token. Token-level cost is N/A; report
# wall time and harness fees separately.
harnesses:
  - name: claude-code
    pricing_model: per_token_via_underlying_model
    note: "Bills via the Anthropic API rate of whichever model is in use."

  - name: cursor
    pricing_model: subscription
    monthly_usd_per_seat: 20.00
    note: "Includes a quota of fast requests; over-quota uses pay-as-you-go."

  - name: github-copilot
    pricing_model: subscription
    monthly_usd_per_seat: 10.00

  - name: aider
    pricing_model: per_token_via_underlying_model
    note: "Free CLI; uses your API key for whichever model you point it at."
