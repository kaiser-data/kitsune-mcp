# pricing.yaml — per-million-token rates by model.
#
# Update manually when providers change prices. Date the entry so historical
# results can be re-priced if needed.
#
# Cost is computed by the runner as:
#   input_cost  = tokens_in  * input_per_million  / 1e6
#   output_cost = tokens_out * output_per_million / 1e6
#   cached_cost = tokens_cached * cached_per_million / 1e6 (when applicable)
#
# Sources should be the provider's pricing page; record the URL.

last_updated: 2026-05-24

models:
  # ── Anthropic ────────────────────────────────────────────────────────────
  - model: claude-opus-4-7
    vendor: anthropic
    input_per_million: 15.00
    output_per_million: 75.00
    cached_per_million: 1.50         # 90% off, 5-min TTL
    source: https://www.anthropic.com/pricing

  - model: claude-sonnet-4-6-20251101
    vendor: anthropic
    input_per_million: 3.00
